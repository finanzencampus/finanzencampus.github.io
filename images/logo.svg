<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Blue rounded square background -->
  <rect width="200" height="200" rx="40" fill="#1d4ed8"/>

  <!-- Ascending bar chart – 4 bars in white -->
  <rect x="22" y="118" width="30" height="58" rx="5" fill="white" opacity="0.25"/>
  <rect x="62" y="94"  width="30" height="82" rx="5" fill="white" opacity="0.35"/>
  <rect x="102" y="66" width="30" height="110" rx="5" fill="white" opacity="0.5"/>
  <rect x="142" y="38" width="30" height="138" rx="5" fill="white" opacity="1"/>

  <!-- Green upward trend line across bar tops -->
  <polyline
    points="37,112  77,88  117,60  157,32"
    stroke="#34d399"
    stroke-width="7"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Arrow head at the end of the trend line -->
  <polyline
    points="140,28  157,32  153,49"
    stroke="#34d399"
    stroke-width="7"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"/>
</svg>
